services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chao
      POSTGRES_PASSWORD: chao_dev_password
      POSTGRES_DB: chao
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
