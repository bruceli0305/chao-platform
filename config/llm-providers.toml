default_provider = "deepseek"

[providers.deepseek]
api_style = "openai-compatible"
base_url = "https://api.deepseek.com"
key_env = "DEEPSEEK_API_KEY"
model_env = "DEEPSEEK_MODEL"
default_model = "deepseek-v4-pro"
notes = "DeepSeek official API is OpenAI-compatible. Default model uses V4 Pro thinking mode."

[providers.openai]
api_style = "openai"
base_url = "https://api.openai.com/v1"
key_env = "OPENAI_API_KEY"
model_env = "OPENAI_MODEL"
default_model = "gpt-4.1-mini"
notes = "OpenAI native API provider."

[providers.anthropic]
api_style = "anthropic"
base_url = "https://api.anthropic.com"
key_env = "ANTHROPIC_API_KEY"
model_env = "ANTHROPIC_MODEL"
default_model = "claude-3-5-sonnet-latest"
notes = "Anthropic native Messages API provider."

[providers.openai-compatible]
api_style = "openai-compatible"
key_env = "CHAO_LLM_API_KEY"
model_env = "CHAO_LLM_MODEL"
notes = "Generic OpenAI-compatible provider configured by environment."
