name: Chao Local MVP CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-gates:
    name: Python gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chao
          POSTGRES_PASSWORD: chao_dev_password
          POSTGRES_DB: chao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chao -d chao"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://chao:chao_dev_password@localhost:5432/chao
      PGPASSWORD: chao_dev_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Initialize database schema
        run: |
          psql "$DATABASE_URL" -f db/init/001_init.sql

      - name: Verify pgvector extension
        run: |
          psql "$DATABASE_URL" -c "select extname from pg_extension;"
          psql "$DATABASE_URL" -c "select extname from pg_extension;" | grep vector

      - name: Ruff lint
        run: uv run ruff check app tests main.py

      - name: Ruff format check
        run: uv run ruff format --check app tests main.py

      - name: Pytest
        run: uv run pytest -q

      - name: Data boundary check
        run: uv run python scripts/data_boundary_check.py

      - name: pgvector ingest dry run
        run: uv run python scripts/ingest_markdown.py --pretty

      - name: Schema check
        run: uv run python scripts/schema_check.py

      - name: Compile Python files
        run: uv run python -m compileall app tests main.py

      - name: Smoke test CLI status
        run: uv run python main.py status

      - name: Smoke test L1 task
        run: |
          uv run python main.py new "CI-L1-修复文案" "把首页标题从系统管理改成项目管理"

      - name: Smoke test L2 task
        run: |
          uv run python main.py new "CI-L2-新增页面" "新增后台应用管理页面，包含列表、搜索和新增弹窗"

      - name: Smoke test L3 task
        run: |
          uv run python main.py new "CI-L3-数据库迁移" "给用户表新增 status 字段，并迁移历史数据"

      - name: Approve L3 task
        run: |
          L3_TASK_CODE=$(psql "$DATABASE_URL" -t -A -c "select task_code from tasks where title = 'CI-L3-数据库迁移' order by created_at desc limit 1;")
          echo "L3_TASK_CODE=$L3_TASK_CODE"
          test -n "$L3_TASK_CODE"
          uv run python main.py approve "$L3_TASK_CODE" --by ci --note "CI approval smoke test"
          psql "$DATABASE_URL" -c "select task_code, status from tasks where task_code = '$L3_TASK_CODE';"
          APPROVED_STATUS=$(psql "$DATABASE_URL" -t -A -c "select status from tasks where task_code = '$L3_TASK_CODE';")
          test "$APPROVED_STATUS" = "APPROVED"

      - name: Verify tasks persisted
        run: |
          psql "$DATABASE_URL" -c "select task_code, title, task_level, status from tasks order by created_at desc limit 10;"
          TASK_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from tasks;" | tr -d ' ')
          echo "TASK_COUNT=$TASK_COUNT"
          test "$TASK_COUNT" -ge 3

      - name: Verify historian records persisted
        run: |
          psql "$DATABASE_URL" -c "select record_type, content, created_by from historian_records order by created_at desc limit 10;"
          RECORD_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from historian_records;" | tr -d ' ')
          echo "RECORD_COUNT=$RECORD_COUNT"
          test "$RECORD_COUNT" -ge 3

      - name: Verify confirmations persisted
        run: |
          psql "$DATABASE_URL" -c "select confirmation_level, status, confirmed_by, note from confirmations order by created_at desc limit 10;"
          CONFIRMATION_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from confirmations;" | tr -d ' ')
          echo "CONFIRMATION_COUNT=$CONFIRMATION_COUNT"
          test "$CONFIRMATION_COUNT" -ge 1

      - name: Verify task events persisted
        run: |
          psql "$DATABASE_URL" -c "select event_type, from_status, to_status, summary, created_by from task_events order by created_at desc limit 10;"
          EVENT_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from task_events;" | tr -d ' ')
          echo "EVENT_COUNT=$EVENT_COUNT"
          test "$EVENT_COUNT" -ge 4

      - name: Verify tool calls persisted
        run: |
          psql "$DATABASE_URL" -c "select agent_name, tool_name, permission_policy, result_status, risk_flag from tool_calls order by started_at desc limit 10;"
          TOOL_CALL_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from tool_calls;" | tr -d ' ')
          echo "TOOL_CALL_COUNT=$TOOL_CALL_COUNT"
          test "$TOOL_CALL_COUNT" -ge 4

      - name: Verify markdown records generated
        run: |
          ls -la .ai-agents/records/tasks
          MARKDOWN_COUNT=$(find .ai-agents/records/tasks -name 'TASK-*.md' | wc -l)
          echo "MARKDOWN_COUNT=$MARKDOWN_COUNT"
          test "$MARKDOWN_COUNT" -ge 3

      - name: Verify artifacts persisted
        run: |
          psql "$DATABASE_URL" -c "select artifact_type, artifact_uri, artifact_hash, access_level, retention_days, summary from artifacts order by created_at desc limit 10;"
          ARTIFACT_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from artifacts;" | tr -d ' ')
          MARKDOWN_ARTIFACT_URIS=$(psql "$DATABASE_URL" -t -A -c "select artifact_uri from artifacts where artifact_type = 'markdown_record';")
          echo "ARTIFACT_COUNT=$ARTIFACT_COUNT"
          test "$ARTIFACT_COUNT" -ge 3
          test -n "$MARKDOWN_ARTIFACT_URIS"
          while IFS= read -r artifact_uri; do
            test -f "$artifact_uri"
          done <<< "$MARKDOWN_ARTIFACT_URIS"

      - name: Verify data assets persisted
        run: |
          psql "$DATABASE_URL" -c "select task_id, asset_name, asset_type, classification, primary_storage, allow_vectorization, desensitized, owner from data_assets order by created_at desc limit 10;"
          DATA_ASSET_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from data_assets where task_id is not null and asset_type = 'markdown_record' and classification = 'D1';" | tr -d ' ')
          DATA_ASSET_ORPHAN_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from data_assets where task_id is null and asset_type = 'markdown_record' and classification = 'D1';" | tr -d ' ')
          echo "DATA_ASSET_COUNT=$DATA_ASSET_COUNT"
          echo "DATA_ASSET_ORPHAN_COUNT=$DATA_ASSET_ORPHAN_COUNT"
          test "$DATA_ASSET_COUNT" -ge 3
          test "$DATA_ASSET_ORPHAN_COUNT" = "0"

      - name: pgvector ingest write smoke
        run: |
          uv run python scripts/ingest_markdown.py --write --pretty
          psql "$DATABASE_URL" -c "select source_path, source_type, data_classification, redacted, ingest_allowed from context_chunks order by created_at desc limit 10;"
          psql "$DATABASE_URL" -c "select task_id, asset_name, asset_type, classification, primary_storage, allow_vectorization, desensitized, owner from data_assets where asset_type = 'context_chunk_source' order by created_at desc limit 10;"
          CONTEXT_CHUNK_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from context_chunks;" | tr -d ' ')
          INGEST_ASSET_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from data_assets where asset_type = 'context_chunk_source' and primary_storage = 'Git / Markdown' and allow_vectorization is true;" | tr -d ' ')
          INGEST_ORPHAN_TASK_RECORD_COUNT=$(psql "$DATABASE_URL" -t -c "select count(*) from data_assets where asset_type = 'context_chunk_source' and asset_name like '.ai-agents/records/tasks/TASK-%.md' and task_id is null;" | tr -d ' ')
          echo "CONTEXT_CHUNK_COUNT=$CONTEXT_CHUNK_COUNT"
          echo "INGEST_ASSET_COUNT=$INGEST_ASSET_COUNT"
          echo "INGEST_ORPHAN_TASK_RECORD_COUNT=$INGEST_ORPHAN_TASK_RECORD_COUNT"
          test "$CONTEXT_CHUNK_COUNT" -ge 1
          test "$INGEST_ASSET_COUNT" -ge 1
          test "$INGEST_ORPHAN_TASK_RECORD_COUNT" = "0"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
